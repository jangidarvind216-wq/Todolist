<html>
 <head>
   <style>
   .Title{
     font-size: 50px;
     }
.button-35 {
  background-color: #3e8e41;
  color: #fff;
  padding-top:10px;
  padding-bottom: 10px;
  padding-left:30px;
  padding-right: 30px;
  border: none;
  margin-right: 10px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 30px;
  width: 150px;
  margin-left: 20px;
  
  transition: background-color 0.3s ease;
}

.button-35:hover {
  background-color:#3e8e41;
}


  .list{
    display: grid;
    grid-template-columns: 500px 250px 200px;
    column-gap:10px;
   grid-row-gap:20px;
   font-size: 50px;
   font-weight: bolder;
   margin-left:20px;
   width:70px;
   margin-bottom: 20px;
  }
  .date{
    font-size: 40px;
  }
  .interface{
    display: grid;
    grid-template-columns: 500px 250px 200px;
    column-gap:10px;
    margin-bottom:10px;
  }
  .Js-input-bar{
    width:500px;
    border-width: 3px;
    height:100px;
    font-size:50px;
    padding-left:30px;
    font-weight: bolder;
    border-radius: 9px;
  }
  
  .js-date{
    width:250px;
    border-width: 3px;
    height:100px;
    font-size:30px;
    padding-left:30px;
    font-weight: bolder;
    border-radius:9px;
    margin-left:10px;
    
  }
 .delete-button {
  background-color: #FF3737;
  color: #fff;
  padding-top:10px;
  padding-bottom: 10px;
  padding-left:30px;
  padding-right: 30px;
  border: none;
  margin-right: 10px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 30px;
  width: 150px;
  height:70px;
;
  
  transition: background-color 0.3s ease;
}
  


.delete-button:hover {
  background-color: #FF6666;
}

  
   </style>
 </head> 
 <body>
   <h1 class="Title">Add Your Task</h1>
   <div class="interface">
   <input type="text" placeholder="To-Do"
   class="Js-input-bar">
   <input type="date" class="js-date" >
   <button class="button-35"
   onclick="addTodo()"
   >Add</button>
   </div>
   <div class="list"></div>
   <script>
   let Todolist=[]
   showTodo()
   function showTodo(){
     let todolistHTML='';
     for(i=0;i<Todolist.length;i++){
     const todoObject = Todolist[i]
     const name = todoObject.name
     const duedate =todoObject.duedate
     const HTML=
     `<div>${name} </div>
     <div class="date">${duedate}</div>
     <button class="delete-button" onclick="
     Todolist.splice(${i},1)
     showTodo();
     ">
     Delete</button>`
     todolistHTML+=HTML
     }
     document.querySelector('.list').innerHTML=todolistHTML
   }
     function addTodo(){
       const task = document.querySelector('.Js-input-bar')
       const newtask =task.value
       
       const dateElement=document.querySelector('.js-date')
       const duedate= dateElement.value;
       Todolist.push({name:newtask,duedate:duedate})
       console.log(Todolist)
       
       showTodo()
     }

     //Update Task
   </script>
 </body>
</html
